apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: default
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-httproute
  namespace: default
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: default
  hostnames:
    - "demo.example.com"
  rules:
    - matches:
        - path:
            type: Prefix
            value: /
      backendRefs:
        - name: demo
          port: 80
