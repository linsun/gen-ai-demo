apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-httproute
  namespace: default
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: default # Assuming agentgateway-proxy is also in the default namespace
  rules:
    - backendRefs:
        - name: demo
          port: 80 # Assuming the demo service is exposed on port 80