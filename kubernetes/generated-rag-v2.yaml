apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-deployment
  namespace: default
  labels:
    app: rag
    version: v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag
      version: v2
  template:
    metadata:
      labels:
        app: rag
        version: v2
    spec:
      containers:
      - name: rag-container
        image: docker.io/linsun/rag:v2
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: rag-service
  namespace: default
  labels:
    app: rag
    version: v2
spec:
  selector:
    app: rag
    version: v2
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
